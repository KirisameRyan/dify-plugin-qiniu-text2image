identity:
  name: "qiniu_text2image"
  author: "KirisameRyan"
  label:
    en_US: "Qiniu Text to Image"
    zh_Hans: "七牛云文生图"

description:
  human:
    en_US: "Generate images from text using Qiniu Cloud AI"
    zh_Hans: "使用七牛云AI从文本生成图片"
  llm: "Generate images from text descriptions using Qiniu Cloud AI image generation models (Gemini). Provide detailed prompts for best results."

parameters:
  - name: prompt
    type: string
    required: true
    label:
      en_US: Prompt
      zh_Hans: 提示词
    human_description:
      en_US: Detailed image description (the more detailed, the better)
      zh_Hans: 图片详细描述(越详细效果越好)
    llm_description: "生成图片的详细文本提示词"
    form: llm

  - name: model
    type: select
    required: true
    default: "gemini-3.0-pro-image-preview"
    label:
      en_US: Model
      zh_Hans: 模型
    human_description:
      en_US: Choose the AI model (Gemini 3.0 Pro recommended)
      zh_Hans: 选择使用的AI模型(推荐Gemini 3.0 Pro)
    options:
      - value: "gemini-3.0-pro-image-preview"
        label:
          en_US: "Gemini 3.0 Pro Image (Recommended)"
          zh_Hans: "Gemini 3.0 Pro 文生图(推荐)"
      - value: "gemini-2.5-flash-image"
        label:
          en_US: "Gemini 2.5 Flash Image (Faster)"
          zh_Hans: "Gemini 2.5 Flash 文生图(更快)"
    form: form

  - name: n
    type: number
    required: false
    default: 1
    min: 1
    max: 4
    label:
      en_US: Number of Images
      zh_Hans: 生成数量
    human_description:
      en_US: How many images to generate (1-4)
      zh_Hans: 生成图片数量(1-4张)
    form: form

  - name: aspect_ratio
    type: select
    required: false
    default: "16:9"
    label:
      en_US: Aspect Ratio
      zh_Hans: 画面比例
    human_description:
      en_US: Choose the image aspect ratio
      zh_Hans: 选择图片宽高比
    options:
      - value: "1:1"
        label:
          en_US: "1:1 Square"
          zh_Hans: "1:1 正方形"
      - value: "16:9"
        label:
          en_US: "16:9 Landscape"
          zh_Hans: "16:9 横图"
      - value: "9:16"
        label:
          en_US: "9:16 Portrait"
          zh_Hans: "9:16 竖图"
      - value: "4:3"
        label:
          en_US: "4:3"
          zh_Hans: "4:3"
    form: form

output:
  type: object
  properties:
    images:
      type: array
      description:
        en_US: Generated image data (base64 encoded PNG)
        zh_Hans: 生成的图片数据(base64编码的PNG)
    model:
      type: string
      description:
        en_US: Model used for generation
        zh_Hans: 使用的生成模型

extra:
  python:
    source: tools/qiniu_text2image.py